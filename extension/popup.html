<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Stackly</title>
  <style>
    :root {
      --bg-base: #0F172A;
      --bg-surface: #1E293B;
      --bg-elevated: #334155;
      --accent: #22C55E;
      --accent-dim: #16A34A;
      --text: #F8FAFC;
      --text-dim: #94A3B8;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-base);
      color: var(--text);
      font-size: 14px;
    }
    .header {
      padding: 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #22C55E, #06B6D4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 18px; height: 18px; color: var(--bg-base); }
    .title { font-weight: 600; font-size: 16px; }
    .subtitle { font-size: 11px; color: var(--text-dim); font-family: ui-monospace, monospace; }

    .content { padding: 16px; }

    .url-box {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      color: var(--text-dim);
      word-break: break-all;
      max-height: 60px;
      overflow-y: auto;
    }

    .scan-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--bg-base);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 150ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .scan-btn:hover { background: var(--accent-dim); }
    .scan-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .settings {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .settings label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .settings input {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: ui-monospace, monospace;
      font-size: 12px;
    }
    .settings input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      background: var(--bg-base);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      display: none;
    }
    .status.active { display: block; }

    .results { margin-top: 16px; max-height: 320px; overflow-y: auto; }

    .category {
      margin-bottom: 12px;
      border-radius: 8px;
      padding: 10px;
      border: 1px solid var(--border);
    }
    .cat-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .cat-count {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-dim);
      background: var(--bg-base);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .tech-pill {
      display: inline-block;
      padding: 4px 8px;
      margin: 2px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
    }
    .meta-row:last-child { border-bottom: none; }
    .meta-label { color: var(--text-dim); }
    .meta-value { font-family: ui-monospace, monospace; color: var(--accent); }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      font-family: ui-monospace, monospace;
    }
    .footer a { color: var(--accent); text-decoration: none; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-top-color: var(--bg-base);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .cat-cms { color: #34D399; }
    .cat-framework { color: #22D3EE; }
    .cat-javascript { color: #FBBF24; }
    .cat-css { color: #F472B6; }
    .cat-server { color: #94A3B8; }
    .cat-hosting { color: #A78BFA; }
    .cat-cdn { color: #FB923C; }
    .cat-database { color: #818CF8; }
    .cat-analytics { color: #60A5FA; }
    .cat-payment { color: #BEF264; }
    .cat-security { color: #F87171; }
    .cat-helpdesk { color: #5EEAD4; }
    .cat-fonts { color: #FCD34D; }
    .cat-ecommerce { color: #86EFAC; }
    .cat-api { color: #C084FC; }
    .cat-build-tool { color: #FDA4AF; }
    .cat-programming { color: #7DD3FC; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
    </div>
    <div>
      <div class="title">Stackly</div>
      <div class="subtitle">v1.0.0 · tech stack detector</div>
    </div>
  </div>

  <div class="content">
    <div id="url" class="url-box">No active tab</div>
    <button id="scan-btn" class="scan-btn">
      <span id="btn-label">Detect Stack</span>
    </button>

    <div class="settings">
      <label for="api-url">API endpoint</label>
      <input id="api-url" type="text" placeholder="http://localhost:8890">
    </div>

    <div id="status" class="status"></div>

    <div id="results" class="results"></div>
  </div>

  <div class="footer">
    <a id="open-web" href="#" target="_blank">open full web UI</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
