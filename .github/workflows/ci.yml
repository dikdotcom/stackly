name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "Files need gofmt:"
            gofmt -l .
            exit 1
          fi
      - name: go vet
        run: go vet ./...

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Install Linux deps for chromedp (no GUI tests in CI)
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64
      - name: Download modules
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -race
      - name: Test (coverage)
        # Only cover packages that have test files — packages without tests
        # trigger `go: no such tool "covdata"` errors during coverage
        # instrumentation. Filter to packages with at least one *_test.go.
        run: |
          TESTABLE=$(go list ./... | while read p; do
            if [ -n "$(go list -f '{{range .TestGoFiles}}{{.}} {{end}}' "$p" 2>/dev/null)" ]; then
              echo "$p"
            fi
          done | tr '\n' ' ')
          echo "Coverage targets: $TESTABLE"
          go test $TESTABLE -race -coverprofile=coverage.out -covermode=atomic
      - name: Coverage summary
        if: matrix.go == '1.22'
        run: |
          go tool cover -func=coverage.out | grep total | awk '{print "Total coverage:", $3}'
      - name: Upload coverage
        if: matrix.go == '1.22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  release:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/stackly-server-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server
          go build -ldflags="-s -w" -o dist/stackly-cli-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/techstack
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stackly-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/